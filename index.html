<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NeelyBot — Gracie's Grove</title>
<meta name="description" content="The Neely family wall hub.">
<meta name="theme-color" content="#6E8B9A">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NeelyBot">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500;600;700;800&family=Source+Sans+3:wght@400;600;700&family=Rye&display=swap" rel="stylesheet">
<style>
:root{
 --canvas:#ECE8DF;--surface:#FAF8F2;--ink:#3B3934;--ink2:#7E7B72;--ink3:#9A958B;
 --border:#E4DDCD;--frame:#CDBFA8;--line:#ECE5D6;
 --blue:#6E8B9A;--blued:#4E6B7A;--bluet:#DCE6EA;--bluer:#B7CBD3;
 --sage:#8AA075;--saged:#5E6B4C;--saget:#E6EBDE;
 --clay:#C18E72;--clayd:#8E5B40;--clayt:#EFE0D5;
 --gold:#CBA85E;--goldd:#8A6B22;--goldt:#F1E8CF;
 --red:#A6624B;--redt:#F3E0DA;
 --gray:#6B6860;--grayt:#E5E3DC;
 --beige:#897349;--beiget:#ECE3D2;
 --amber:#BE8A6E;--ryan:#6E8B9A;--caden:#C3A65E;--gavin:#8AA075;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--canvas);font-family:'Source Sans 3',system-ui,sans-serif;color:var(--ink);display:flex;overflow:hidden}
.s{font-family:'Roboto Slab',Georgia,serif}
svg{display:block}
.g{fill:none;stroke-linecap:round;stroke-linejoin:round}

/* RAIL */
.rail{width:80px;flex:none;background:var(--surface);border-right:1.5px solid var(--ink);display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 0;overflow-y:auto;height:100vh}
.rail::-webkit-scrollbar{width:0}
.rb{width:64px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;border-radius:13px;cursor:pointer;color:var(--ink2)}
.rb svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.rb span{font-size:8.5px;font-weight:700;letter-spacing:.01em}
.rb:hover{background:#F1ECE0}
.rb.on{background:var(--bluet);color:var(--blued)}

/* STAGE */
.stage{flex:1;height:100vh;overflow-y:auto}
.wrap{max-width:980px;margin:0 auto;padding:16px 18px 60px}

/* HEADER */
.hdr{background:var(--surface);border:1.5px solid var(--ink);border-radius:12px;padding:4px;margin-bottom:12px}
.hdr .in{border:1px solid var(--bluer);border-radius:8px;padding:12px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:relative}
.hdr .corner{position:absolute;width:6px;height:6px;background:var(--blue);transform:rotate(45deg)}
.greet{font-weight:700;font-size:26px;color:#5E8194;line-height:1}
.date{font-size:12px;color:var(--ink2);margin-top:5px}
.clock{font-weight:700;font-size:40px;color:var(--ink);line-height:.9}
.clock small{font-size:15px;color:var(--blue);font-weight:600}
.wx{display:flex;align-items:center;gap:8px;padding-left:14px;border-left:1px solid #C9D2D6}
.plc{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);background:#F1ECE0;border:1px solid var(--border);border-radius:5px;padding:2px 5px;position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);white-space:nowrap}

/* SCREENS */
.screen{display:none}
.screen.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.title{font-weight:800;font-size:22px;color:var(--ink);margin:2px 0 14px;display:flex;align-items:center;gap:10px}
.title .tag{font-size:11px;font-weight:700;color:var(--ink3);background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:3px 10px;margin-left:auto}

/* COMPONENTS */
.card{background:var(--surface);border:1.5px solid var(--ink);border-radius:12px;padding:4px;margin-bottom:11px;display:flex;flex-direction:column}
.card .in{border:1px solid var(--frame);border-radius:9px;padding:14px 15px;flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:9px}
.gl{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin:14px 0 7px}
.gl.first{margin-top:2px}
.row{display:flex;align-items:center;gap:11px;padding:9px 2px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.av{border-radius:50%;color:#FAF8F2;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
.bd{border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
.bdc{border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;border-radius:99px;padding:4px 11px}
.btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 13px;border-radius:8px;background:var(--blue);color:#FAF8F2;font-size:12px;font-weight:700;border:none;cursor:pointer}
.btn svg{width:14px;height:14px;fill:none;stroke:#FAF8F2;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.tog{width:42px;height:24px;border-radius:99px;position:relative;flex:none}
.tog .k{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#FAF8F2}
.on .k,.tog.on .k{left:21px}.off .k,.tog.off .k{left:3px;top:2px}
.act{width:25px;height:25px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none}
.act svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.view{background:var(--bluet);color:var(--blued)}.edit{background:var(--grayt);color:var(--gray)}.del{background:var(--redt);color:var(--red)}
.search{display:flex;align-items:center;gap:9px;height:38px;padding:0 13px;border-radius:9px;border:1.5px solid #D7D0C0;background:#FCFAF4;color:var(--ink3);font-size:12.5px}
.track{height:8px;border-radius:99px;background:#E7E2D6;overflow:hidden}
.fill{height:100%;border-radius:99px}
.money{font-family:'Roboto Slab',serif;font-weight:700;font-size:11px;color:var(--saged);background:var(--saget);border:1px solid #C9D3BC;border-radius:6px;padding:1px 6px}
.tn{font-family:'Roboto Slab',serif;font-weight:700;font-size:14px;color:var(--ink)}
.ic{fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
.muted{color:var(--ink3)}
.note{font-size:11px;color:var(--ink3);margin-top:13px;padding-top:11px;border-top:1px solid var(--line);display:flex;gap:7px;align-items:flex-start}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px;display:flex;align-items:center;gap:11px}
.cam{position:relative;border-radius:10px;overflow:hidden;border:1.5px solid var(--ink);aspect-ratio:4/3;background:linear-gradient(160deg,#3c444a,#23282b)}
.live{position:absolute;top:6px;left:6px;display:flex;align-items:center;gap:4px;font-size:8px;font-weight:700;color:#F4EFE6}
.camname{position:absolute;bottom:5px;left:7px;font-size:10px;font-weight:700;color:#F4EFE6}
.sec{font-family:'Roboto Slab',serif;font-weight:700;font-size:15px;color:var(--ink);margin:2px 0 2px}
.addcart{width:27px;height:27px;border-radius:50%;border:none;background:var(--bluet);color:var(--blued);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
.addcart svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.4;stroke-linecap:round}
.modal{display:none;position:fixed;inset:0;background:rgba(43,40,34,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-box{background:var(--surface);border:1.5px solid var(--ink);border-radius:16px;padding:5px;max-width:380px;width:100%}
.modal-box .pad{border:1px solid var(--frame);border-radius:12px;padding:18px}
.storebtn{display:flex;align-items:center;gap:10px;width:100%;height:44px;padding:0 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:700;color:var(--ink);cursor:pointer}
.storebtn:hover{background:#F1ECE0}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--ink);color:var(--surface);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;max-width:88%;text-align:center}
.toast.show{opacity:1}
.modal-box .pad{max-height:82vh;overflow-y:auto}
.fld{width:100%;min-height:40px;padding:9px 12px;border-radius:9px;border:1.5px solid #D7D0C0;background:#FCFAF4;font-size:13px;color:var(--ink);font-family:inherit;resize:none;box-sizing:border-box}
.fld:focus{outline:none;border-color:var(--blue)}
summary{list-style:none}summary::-webkit-details-marker{display:none}
details[open]>summary .ic{transform:rotate(180deg)}

/* ---------- PHONE / NARROW SCREENS ---------- */
@media (max-width:640px){
  body{display:block;overflow-x:hidden;overflow-y:auto;height:auto}
  .rail{position:fixed;bottom:0;left:0;right:0;width:auto;height:auto;flex-direction:row;justify-content:flex-start;align-items:stretch;gap:2px;padding:5px 6px;border-right:none;border-top:1.5px solid var(--ink);overflow-x:auto;overflow-y:hidden;z-index:60}
  .rb{flex:0 0 auto;width:58px;padding:6px 0;border-radius:11px}
  .stage{height:auto;overflow:visible}
  .wrap{max-width:100%;padding:12px 12px 90px}
  .hdr .in{padding:11px 13px;gap:9px}
  .greet{font-size:20px}
  .date{font-size:11px}
  .clock{font-size:30px}
  .clock small{font-size:12px}
  .wx{padding-left:10px}
  .wx svg{width:26px;height:26px}
  .plc{display:none}
  .grid2,.grid3{grid-template-columns:1fr !important}
  .grid2:has(.cam){grid-template-columns:repeat(2,1fr) !important}
  .title{font-size:19px}
  .card .in{padding:13px}
}
</style>
</head>
<body>

<nav class="rail" id="rail"></nav>

<div class="stage">
 <div class="wrap">
  <div class="hdr"><div class="in">
    <span class="corner" style="top:6px;left:6px"></span><span class="corner" style="top:6px;right:6px"></span>
    <div style="flex:none">
     <img src="logo.png" width="58" height="58" alt="NeelyBot" style="display:block">
    </div>
    <div><div class="greet" id="greet">Mornin', Y'all</div><div class="date" id="date">Gracie's Grove · Burnet, TX</div></div>
    <div style="flex:1;min-width:8px"></div>
    <div class="clock" id="clock">--:--</div>
    <div class="wx"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><g stroke="#C9A24E" stroke-width="1.6"><circle cx="8.5" cy="8" r="3"/><path d="M8.5 2.2v1.8M3 8h1.8M4.7 4.2 6 5.5M12.3 4.2 11 5.5"/></g><path d="M8 19h8.2a3.4 3.4 0 0 0 .3-6.8A5 5 0 0 0 7 12.6 3.4 3.4 0 0 0 8 19Z" stroke="#6E8B9A" stroke-width="1.6"/></svg><div><div class="s" style="font-weight:700;font-size:18px">86&deg;</div><div style="font-size:10px;color:var(--ink2)">Burnet</div></div></div>
  </div></div>

  <div id="screens"></div>
 </div>
</div>

<div id="modal" class="modal" onclick="if(event.target===this)closeModal()"><div class="modal-box"><div class="pad"></div></div></div>
<div id="toast" class="toast"></div>

<script>
const C={caden:'#C3A65E',gavin:'#8AA075',amber:'#BE8A6E',ryan:'#6E8B9A'};
const NCOL={Amber:'color:#8E5B40;background:var(--clayt)',Ryan:'color:var(--blued);background:var(--bluet)',Caden:'color:var(--goldd);background:var(--goldt)',Gavin:'color:var(--saged);background:var(--saget)',Anyone:'color:var(--gray);background:var(--grayt)'};
function call(stroke){return `<svg class="ic" width="17" height="17" viewBox="0 0 24 24" stroke="${stroke}" stroke-width="1.9"><path d="M5 4h3l2 5-2.5 1.5a11 11 0 0 0 5 5L17 13l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 4 6 2 2 0 0 1 6 4"/></svg>`}
const VED=`<span class="act view"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-6.5 10-6.5S22 12 22 12s-3.5 6.5-10 6.5S2 12 2 12Z"/><circle cx="12" cy="12" r="2.3"/></svg></span><span class="act edit"><svg viewBox="0 0 24 24"><path d="M5 19h3l9.5-9.5-3-3L5 16zM14.5 6.5l3 3"/></svg></span><span class="act del"><svg viewBox="0 0 24 24"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg></span>`;
const ED=`<span class="act edit"><svg viewBox="0 0 24 24"><path d="M5 19h3l9.5-9.5-3-3L5 16zM14.5 6.5l3 3"/></svg></span><span class="act del"><svg viewBox="0 0 24 24"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg></span>`;
const edDel=(n)=>`<span class="act edit" onclick="openForm('Edit',[['Name','${n}'],['Notes','']],'Save','Saved')"><svg viewBox="0 0 24 24"><path d="M5 19h3l9.5-9.5-3-3L5 16zM14.5 6.5l3 3"/></svg></span><span class="act del" onclick="delConfirm('${n}')"><svg viewBox="0 0 24 24"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg></span>`;
const addBtn=t=>`<button class="btn"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>${t||'Add'}</button>`;
const searchBox=t=>`<div class="search"><svg class="ic" width="16" height="16" viewBox="0 0 24 24" stroke="#9A958B" stroke-width="2"><circle cx="11" cy="11" r="6"/><path d="M15.5 15.5 20 20"/></svg>${t}</div>`;
const av=(n,c,s)=>`<span class="av" style="width:${s||34}px;height:${s||34}px;font-size:${(s||34)/2.6}px;background:${c}">${n}</span>`;
function title(t,tag){return `<div class="title"><span>${t}</span>${tag?`<span class="tag">${tag}</span>`:''}</div>`}

const SCR={};

/* ---------- HOME ---------- */
SCR.home=()=>title('Home')+`
<div class="grid2">
 <div class="card"><div class="in" onclick="go('calendar')" style="cursor:pointer"><div class="lbl">Today</div>
  ${[[C.amber,'Farmers Market','8:30 · Amber'],[C.ryan,'Vet — Gracie','9:00 · Ryan'],[C.caden,'Baseball Practice','5:30 · Caden']].map(e=>`<div class="row" style="border:none;padding:6px 0;cursor:pointer"><span style="width:4px;height:28px;border-radius:3px;background:${e[0]}"></span><div style="flex:1"><b style="font-size:13px">${e[1]}</b><div class="muted" style="font-size:11px">${e[2]}</div></div></div>`).join('')} </div></div>
 <div class="card"><div class="in" onclick="go('calendar')" style="cursor:pointer"><div class="lbl">This Week</div>
  ${[[C.gavin,'Mon · Trash Day','Gavin'],[C.caden,'Wed · Game vs. Burnet','6:00 · Caden'],[C.ryan,'Fri · Hay Delivery','10:00 · Ryan'],['#B7B3AA','Sat · Church BBQ','Everyone']].map(e=>`<div class="row" style="border:none;padding:6px 0;cursor:pointer"><span style="width:4px;height:28px;border-radius:3px;background:${e[0]}"></span><div style="flex:1"><b style="font-size:13px">${e[1]}</b><div class="muted" style="font-size:11px">${e[2]}</div></div></div>`).join('')}
 </div></div>
</div>
<div class="grid2">
 <div class="card"><div class="in" onclick="go('chores')" style="cursor:pointer"><div class="lbl">Chores Today</div>
  ${[['Amber',C.amber,'4/4'],['Ryan',C.ryan,'2/3'],['Caden',C.caden,'3/5'],['Gavin',C.gavin,'1/2']].map(p=>`<div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">${av(p[0][0],p[1],24)}<span style="font-size:12px;font-weight:600;width:48px">${p[0]}</span><span class="track" style="flex:1"><span class="fill" style="width:${parseInt(p[2])/parseInt(p[2].split('/')[1])*100}%;background:${p[1]}"></span></span><b style="font-size:11px;color:var(--saged)">${p[2]}</b></div>`).join('')}
 </div></div>
 <div class="card"><div class="in" onclick="go('reminders')" style="cursor:pointer"><div class="lbl">Reminders</div>
  ${[['Water Filter (Sink)','Due now · Ryan','red'],['Register The Boat','Due now','red'],['Pay Bills','Jul 1','gold'],['Simparica Trio','Jul 1','gold']].map(r=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px"><span style="width:8px;height:8px;border-radius:50%;flex:none;background:${r[2]==='red'?'var(--red)':'var(--gold)'}"></span><div style="flex:1"><b style="font-size:12.5px">${r[0]}</b></div><span class="muted" style="font-size:10.5px;font-weight:600">${r[1]}</span></div>`).join('')}
 </div></div>
</div>
<div class="card"><div class="in"><div class="lbl">Quick Open</div>
 <div class="grid2" style="grid-template-columns:repeat(5,1fr)">${[['smarthome','Smart Home','M4 11.5 12 5l8 6.5M6.5 10.5v8.5h11v-8.5M12 19v-3.4','var(--saged)','var(--saget)'],['remotes','Remotes','M8 3h8a1.5 1.5 0 0 1 1.5 1.5v15A1.5 1.5 0 0 1 16 21H8a1.5 1.5 0 0 1-1.5-1.5v-15A1.5 1.5 0 0 1 8 3M12 6.5h.01M10 9.5h4M10 12h4','var(--clayd)','var(--clayt)'],['shopping','Shopping List','M3 4.5h2.2l2 11h9.8l1.8-8H7','var(--blued)','var(--bluet)'],['emergency','Emergency','M12 4 2.8 20h18.4zM12 10v4M12 17v.01','var(--red)','var(--redt)'],['kidsbank','Bank','M12 3v18M16 7.5c0-2-1.8-3-4-3s-4 1.2-4 3 1.8 2.5 4 3 4 1.2 4 3-1.8 3-4 3-4-1-4-3','var(--goldd)','var(--goldt)']].map(q=>`<div onclick="go('${q[0]}')" class="tile" style="cursor:pointer;flex-direction:column;text-align:center;gap:9px;padding:17px 8px"><span class="bdc" style="width:44px;height:44px;background:${q[4]};color:${q[3]}"><svg class="ic" width="23" height="23" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9"><path d="${q[2]}"/></svg></span><b style="font-size:12px">${q[1]}</b></div>`).join('')}</div>
</div></div>`;

/* ---------- CALENDAR ---------- */
let calView='Month',calPerson='All';
const PCOL={Amber:C.amber,Ryan:C.ryan,Caden:C.caden,Gavin:C.gavin,Everyone:'#B7B3AA'};
const CAL_EV=[{d:0,t:'8:30',ap:'AM',title:'Farmers Market',short:'Market',who:['Amber']},{d:0,t:'9:00',ap:'AM',title:'Vet — Gracie',short:'9a Vet',who:['Ryan']},{d:0,t:'',ap:'',title:'Church',short:'Church',who:['Everyone']},{d:1,t:'7:00',ap:'AM',title:'Trash Day',short:'7a Trash',who:['Gavin']},{d:1,t:'5:30',ap:'PM',title:'Baseball Practice',short:'5:30 Ball',who:['Caden']},{d:2,t:'',ap:'',title:'Dentist',short:'Dentist',who:['Amber']},{d:3,t:'6:00',ap:'PM',title:'Game vs. Burnet',short:'6p Game',who:['Caden','Ryan']},{d:4,t:'10:00',ap:'AM',title:'Hay Delivery',short:'10a Hay',who:['Ryan']},{d:6,t:'',ap:'',title:'Church BBQ',short:'BBQ',who:['Everyone']},{d:6,t:'',ap:'',title:'Tournament',short:'Tourney',who:['Caden','Gavin']}];
function calMatch(e){return calPerson==='All'||e.who.includes(calPerson)||e.who.includes('Everyone')}
function calCols(e){return [...new Set(e.who.map(w=>PCOL[w]))]}
function setCalView(v){calView=v;document.getElementById('screens').innerHTML=SCR.calendar();document.querySelector('.stage').scrollTop=0}
function setCalPerson(p){calPerson=p;document.getElementById('screens').innerHTML=SCR.calendar();document.querySelector('.stage').scrollTop=0}
function calWeek(){return `<div class="card"><div class="in"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">${['Sun 28','Mon 29','Tue 30','Wed 1','Thu 2','Fri 3','Sat 4'].map((d,i)=>`<div style="text-align:center"><div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--ink3)">${d.split(' ')[0]}</div><div class="s" style="font-weight:700;font-size:15px;${i===1?'background:var(--blue);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin:3px auto 0':'margin-top:3px'}">${d.split(' ')[1]}</div></div>`).join('')}${[0,1,2,3,4,5,6].map(i=>`<div style="min-height:92px;background:${i===1?'#EFF3F0':'#F4EEE1'};border-radius:8px;padding:5px 4px">${CAL_EV.filter(e=>e.d===i&&calMatch(e)).map(e=>`<div style="display:flex;gap:5px;background:#FAF6EC;border:1px solid #EAE2D2;border-radius:5px;overflow:hidden;margin-bottom:4px"><div style="width:4px;display:flex;flex-direction:column">${calCols(e).map(c=>`<span style="flex:1;background:${c}"></span>`).join('')}</div><div style="padding:3px 4px 3px 0;font-size:9px;font-weight:700">${e.short}</div></div>`).join('')}</div>`).join('')}</div><div class="note"><span>Tap a name above to see just their plans.</span></div></div></div>`}
function calDay(){const evs=CAL_EV.filter(e=>e.d===1&&calMatch(e));return `<div class="card"><div class="in"><div class="lbl">Monday · June 29</div>${evs.length?evs.map(e=>`<div class="row"><span style="width:4px;height:36px;border-radius:3px;background:${calCols(e)[0]};flex:none"></span><div style="width:52px;flex:none"><b class="s" style="font-size:14px">${e.t}</b><span style="font-size:9px;color:var(--ink3);font-weight:700"> ${e.ap}</span></div><div style="flex:1"><b style="font-size:13.5px">${e.title}</b><div class="muted" style="font-size:11px">${e.who.join(', ')}</div></div></div>`).join(''):`<div class="muted" style="font-size:12px;padding:4px 2px">Nothing${calPerson!=='All'?' for '+calPerson:''} today.</div>`}</div></div>`}
function calMonth(){const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];const cells=[{d:31,m:1}];for(let d=1;d<=30;d++)cells.push({d:d});[1,2,3,4].forEach(d=>cells.push({d:d,m:1}));const md={28:0,29:1,30:2};const dots={};Object.keys(md).forEach(dt=>{const evs=CAL_EV.filter(e=>e.d===md[dt]&&calMatch(e));dots[dt]=[...new Set(evs.flatMap(calCols))].slice(0,4)});return `<div class="card"><div class="in"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${dow.map(d=>`<div style="text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--ink3);padding-bottom:2px">${d}</div>`).join('')}${cells.map(c=>`<div style="aspect-ratio:1;border-radius:7px;background:${c.m?'transparent':'#F4EEE1'};display:flex;flex-direction:column;align-items:center;padding-top:5px"><span class="s" style="font-size:12px;font-weight:700;${c.d===29&&!c.m?'background:var(--blue);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center':'color:'+(c.m?'#C7C0B0':'var(--ink)')}">${c.d}</span><div style="display:flex;gap:2px;margin-top:3px">${(!c.m&&dots[c.d]?dots[c.d]:[]).map(col=>`<span style="width:5px;height:5px;border-radius:50%;background:${col}"></span>`).join('')}</div></div>`).join('')}</div></div></div>`}
function calYear(){const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const yp={0:['Ryan'],5:['Amber','Ryan','Caden','Gavin'],6:['Ryan','Caden','Gavin'],8:['Gavin'],11:['Amber']};return `<div class="card"><div class="in"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">${M.map((m,i)=>`<div class="tile" style="flex-direction:column;align-items:flex-start;padding:12px 13px"><b class="s" style="font-size:14px">${m}</b><div style="display:flex;gap:3px;margin-top:9px;min-height:6px">${(yp[i]||[]).filter(p=>calPerson==='All'||p===calPerson).map(p=>`<span style="width:6px;height:6px;border-radius:50%;background:${PCOL[p]}"></span>`).join('')}</div></div>`).join('')}</div></div></div>`}
SCR.calendar=()=>title('Calendar')+`<div class="card"><div class="in"><div style="display:flex;align-items:center;gap:9px"><div style="display:flex;gap:7px;flex-wrap:wrap;flex:1">${['Day','Week','Month','Year'].map(f=>`<span onclick="setCalView('${f}')" class="chip" style="cursor:pointer;${calView===f?'background:var(--blue);color:#fff':'border:1.5px solid var(--border);color:var(--ink3)'}">${f}</span>`).join('')}</div><span class="muted s" style="font-size:13px;font-weight:700">${calView==='Year'?'2026':calView==='Day'?'Jun 29':'June 2026'}</span></div><div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:11px">${[['All',''],['Amber',C.amber],['Ryan',C.ryan],['Caden',C.caden],['Gavin',C.gavin]].map(p=>`<span onclick="setCalPerson('${p[0]}')" class="chip" style="cursor:pointer;${calPerson===p[0]?'background:var(--blue);color:#fff':'border:1.5px solid var(--border);color:var(--ink2)'}">${p[1]?`<span style="width:8px;height:8px;border-radius:50%;background:${p[1]}"></span>`:''}${p[0]}</span>`).join('')}</div></div></div>`+(calView==='Day'?calDay():calView==='Week'?calWeek():calView==='Year'?calYear():calMonth());

function openApprovals(){PIN='';PIN_CB=showApprovalsList;const pad=document.querySelector('#modal .pad');pad.innerHTML='<div class="s" style="font-weight:700;font-size:16px;text-align:center;margin-bottom:4px">Approvals</div><div class="muted" style="font-size:11px;text-align:center;margin-bottom:14px">Enter the Hub Code to review</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:208px;margin:0 auto">'+[1,2,3,4,5,6,7,8,9,'star',0,'del'].map(function(k){return k==='star'?'<span style="height:46px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#9A958B">★</span>':'<span onclick="pin(\''+k+'\')" style="height:46px;border-radius:10px;background:#E8E6DF;border:1px solid #CBC8BD;display:flex;align-items:center;justify-content:center;font-family:\'Roboto Slab\',serif;font-size:18px;font-weight:700;cursor:pointer;user-select:none">'+(k==='del'?'⌫':k)+'</span>'}).join('')+'</div><div style="display:flex;gap:10px;justify-content:center;margin-top:16px">'+[0,1,2,3].map(function(){return '<span class="pdot" style="width:13px;height:13px;border-radius:50%;border:1.5px solid #2A2620;background:transparent"></span>'}).join('')+'</div><button onclick="closeModal()" style="width:100%;height:38px;border-radius:10px;border:none;background:none;color:var(--ink3);font-weight:700;cursor:pointer;margin-top:14px">Cancel</button>';document.getElementById('modal').classList.add('show')}
function showApprovalsList(){const pad=document.querySelector('#modal .pad');if(!APPROVALS.length){pad.innerHTML='<div class="lbl" style="margin-bottom:8px">Approvals</div><div class="muted" style="font-size:13px;margin-bottom:14px">All caught up — nothing to approve! 🎉</div><button onclick="closeModal()" style="width:100%;height:40px;border-radius:10px;border:1.5px solid var(--border);background:none;color:var(--ink2);font-weight:700;cursor:pointer">Done</button>';return}pad.innerHTML='<div class="lbl" style="margin-bottom:10px">Approvals · '+APPROVALS.length+' Pending</div>'+APPROVALS.map(function(a,i){return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:9px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:3px"><span class="av" style="width:24px;height:24px;font-size:10px;background:'+a.color+'">'+a.who[0]+'</span><b style="flex:1;font-size:13.5px">'+a.title+'</b></div><div class="muted" style="font-size:11px;margin-bottom:9px">'+a.who+' · '+a.desc+'</div><div style="display:flex;align-items:center;gap:7px"><span style="font-size:12px;color:var(--ink3);font-weight:700">$</span><input id="amt'+i+'" class="fld" type="number" step="0.01" min="0" value="'+a.amt.toFixed(2)+'" style="width:74px;height:34px;padding:0 8px"><span style="flex:1"></span><button onclick="rejectChore('+i+')" style="height:34px;padding:0 12px;border-radius:8px;border:1.5px solid var(--red);background:none;color:var(--red);font-weight:700;cursor:pointer">Reject</button><button onclick="approveChore('+i+')" style="height:34px;padding:0 13px;border-radius:8px;border:none;background:var(--sage);color:#fff;font-weight:700;cursor:pointer">Approve</button></div></div>'}).join('')+'<button onclick="closeModal()" style="width:100%;height:40px;border-radius:10px;border:1.5px solid var(--border);background:none;color:var(--ink2);font-weight:700;cursor:pointer;margin-top:2px">Done</button>';document.getElementById('moda function approveChore(i){const a=APPROVALS[i];const el=document.getElementById('amt'+i);const amt=parseFloat(el?el.value:a.amt)||0;APPROVALS.splice(i,1);toast('Approved · $'+amt.toFixed(2)+' to '+a.who+' · logged: Chore - '+a.title);if(location.hash==='#chores')document.getElementById('screens').innerHTML=SCR.chores();showApprovalsList()}
function rejectChore(i){const a=APPROVALS[i];UNDONE.push({title:a.title,desc:a.desc,who:a.who,color:a.color,tag:'Rejected'});APPROVALS.splice(i,1);toast('Rejected · '+a.title+' — no money deposited');if(location.hash==='#chores')document.getElementById('screens').innerHTML=SCR.chores();showApprovalsList()}
SCR.chores=()=>{const list=CHORES.filter(c=>choreFilter==='All'||c[0]===choreFilter);const choreRow=c=>`<div class="row">${av(c[0][0],c[1],26)}<div style="flex:1;min-width:0"><b style="font-size:13px;display:block">${c[3]}</b>${c[7]?`<div class="muted" style="font-size:10px;margin-top:1px">${c[7]}</div>`:''}${c[6]?'<span class="chip" style="color:var(--red);background:var(--redt);font-size:9px;margin-top:4px">⚠ 1 Day Left</span>':''}</div><span style="width:54px;text-align:right;flex:none">${c[4]?`<span class="money">${c[4]}</span>`:'<span class="muted" style="font-size:10px;font-weight:700">No Pay</span>'}</span><span style="width:132px;display:flex;justify-content:flex-end;flex:none">${c[5]==='wait'?'<span class="chip" style="color:var(--goldd);background:var(--goldt)">Waiting Approval</span>':c[5]==='done'?'<span class="chip" style="color:var(--saged);background:none;border:1.5px solid var(--sage)">✓ Complete</span>':'<span class="chip" style="color:var(--red);background:var(--redt)">To Do</span>'}</span></div>`;return title('Chores')+`<div class="card"><div class="in"><div style="display:flex;align-items:center;gap:9px"><div style="display:flex;gap:6px;flex-wrap:wrap;flex:1">${CHORE_PEOPLE.map(p=>`<span onclick="setChoreFilter('${p[0]}')" class="chip" style="cursor:pointer;${choreFilter===p[0]?'background:var(--blue);color:#fff':'border:1.5px solid var(--border);color:var(--ink2)'}">${p[1]?`<span style="width:8px;height:8px;border-radius:50%;background:${p[1]}"></span>`:''}${p[0]}</span>`).join('')}</div><button class="btn" onclick="openForm('Add Chore',[['Chore','e.g. Take Out Trash'],['Who','','select',['Caden','Gavin','Amber','Ryan']],['When','','select',['Morning','Evening','Whenever']],['Pay','0.00','number'],['Description','What exactly to do…','area']],'Add Chore','Chore added ✅')"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Add Chore</button></div></div></div>`+(APPROVALS.length?`<div class="card" onclick="openApprovals()" style="cursor:pointer"><div class="in" style="display:flex;align-items:center;gap:11px"><span class="bdc" style="width:36px;height:36px;background:var(--goldt);color:var(--goldd)"><svg class="ic" width="19" height="19" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9"><path d="M12 8v4l3 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg></span><div style="flex:1"><b style="font-size:14px">Approvals</b><div class="muted" style="font-size:10.5px">Tap to review · Hub Code</div></div><span class="chip" style="color:var(--goldd);background:var(--goldt)">${APPROVALS.length} Pending</span><span class="act" style="color:#C7C0B0"><svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></span></div></div>`:'')+['Morning','Evening','Whenever'].map(sec=>{const items=list.filter(c=>c[2]===sec);return `<div class="card"><div class="in"><div class="lbl" style="margin-bottom:7px">${sec}</div>${items.length?items.map(choreRow).join(''):`<div class="muted" style="font-size:12px;padding:3px 2px">Nothing in ${sec.toLowerCase()}${choreFilter!=='All'?' for '+choreFilter:''}.</div>`}</div></div>`}).join('')+`<div class="card"><div class="in"><div class="lbl" style="margin-bottom:7px">Undone Chores</div>${UNDONE.length?UNDONE.map(u=>`<div class="row">${av(u.who[0],u.color,26)}<div style="flex:1;min-width:0"><b style="font-size:13px;display:block">${u.title}</b><div class="muted" style="font-size:10px">${u.who} · ${u.desc}</div></div><span class="chip" style="font-size:9px;${u.tag==='Rejected'?'color:var(--red);background:var(--redt)':'color:var(--gray);background:var(--grayt)'}">${u.tag}</span></div>`).join(''):`<div class="muted" style="font-size:12px;padding:3px 2px">Nothing undone — nice work! 🎉</div>`}</div></div>`};

var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 11px;margin-top:8px"><div style="display:flex;align-items:center;gap:8px"><b class="s" style="flex:1;font-size:13.5px">${g[0]}</b><b class="s" style="font-size:13.5px">$${g[1]}</b>${edDel(g[0])}</div>${g[2]?`<div class="muted" style="font-size:11px;font-style:italic;margin-top:3px">"${g[2]}"</div>`:''}<div class="track" style="margin-top:9px"><div class="fill" style="width:${pct}%;background:var(--sage)"></div></div><div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px"><b style="color:var(--saged)">$${k[2].toFixed(2)} saved</b><span class="muted">$${left} to go</span></div></div>`}).join('')}${txList()}</div>`).join('')}</div></div>`;

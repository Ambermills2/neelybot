<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NeelyBot — Gracie's Grove</title>
<meta name="description" content="The Neely family wall hub.">
<meta name="theme-color" content="#6E8B9A">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NeelyBot">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500;600;700;800&family=Source+Sans+3:wght@400;600;700&family=Rye&display=swap" rel="stylesheet">
<style>
:root{
 --canvas:#ECE8DF;--surface:#FAF8F2;--ink:#3B3934;--ink2:#7E7B72;--ink3:#9A958B;
 --border:#E4DDCD;--frame:#CDBFA8;--line:#ECE5D6;
 --blue:#6E8B9A;--blued:#4E6B7A;--bluet:#DCE6EA;--bluer:#B7CBD3;
 --sage:#8AA075;--saged:#5E6B4C;--saget:#E6EBDE;
 --clay:#C18E72;--clayd:#8E5B40;--clayt:#EFE0D5;
 --gold:#CBA85E;--goldd:#8A6B22;--goldt:#F1E8CF;
 --red:#A6624B;--redt:#F3E0DA;
 --gray:#6B6860;--grayt:#E5E3DC;
 --beige:#897349;--beiget:#ECE3D2;
 --amber:#BE8A6E;--ryan:#6E8B9A;--caden:#C3A65E;--gavin:#8AA075;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--canvas);font-family:'Source Sans 3',system-ui,sans-serif;color:var(--ink);display:flex;overflow:hidden}
.s{font-family:'Roboto Slab',Georgia,serif}
svg{display:block}
.g{fill:none;stroke-linecap:round;stroke-linejoin:round}

/* RAIL */
.rail{width:80px;flex:none;background:var(--surface);border-right:1.5px solid var(--ink);display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 0;overflow-y:auto;height:100vh}
.rail::-webkit-scrollbar{width:0}
.rb{width:64px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;border-radius:13px;cursor:pointer;color:var(--ink2)}
.rb svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.rb span{font-size:8.5px;font-weight:700;letter-spacing:.01em}
.rb:hover{background:#F1ECE0}
.rb.on{background:var(--bluet);color:var(--blued)}

/* STAGE */
.stage{flex:1;height:100vh;overflow-y:auto}
.wrap{max-width:980px;margin:0 auto;padding:16px 18px 60px}

/* HEADER */
.hdr{background:var(--surface);border:1.5px solid var(--ink);border-radius:12px;padding:4px;margin-bottom:12px}
.hdr .in{border:1px solid var(--bluer);border-radius:8px;padding:12px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:relative}
.hdr .corner{position:absolute;width:6px;height:6px;background:var(--blue);transform:rotate(45deg)}
.greet{font-weight:700;font-size:26px;color:#5E8194;line-height:1}
.date{font-size:12px;color:var(--ink2);margin-top:5px}
.clock{font-weight:700;font-size:40px;color:var(--ink);line-height:.9}
.clock small{font-size:15px;color:var(--blue);font-weight:600}
.wx{display:flex;align-items:center;gap:8px;padding-left:14px;border-left:1px solid #C9D2D6}
.plc{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);background:#F1ECE0;border:1px solid var(--border);border-radius:5px;padding:2px 5px;position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);white-space:nowrap}

/* SCREENS */
.screen{display:none}
.screen.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.title{font-weight:800;font-size:22px;color:var(--ink);margin:2px 0 14px;display:flex;align-items:center;gap:10px}
.title .tag{font-size:11px;font-weight:700;color:var(--ink3);background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:3px 10px;margin-left:auto}

/* COMPONENTS */
.card{background:var(--surface);border:1.5px solid var(--ink);border-radius:12px;padding:4px;margin-bottom:11px}
.card .in{border:1px solid var(--frame);border-radius:9px;padding:14px 15px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:9px}
.gl{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin:14px 0 7px}
.gl.first{margin-top:2px}
.row{display:flex;align-items:center;gap:11px;padding:9px 2px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.av{border-radius:50%;color:#FAF8F2;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
.bd{border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
.bdc{border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;border-radius:99px;padding:4px 11px}
.btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 13px;border-radius:8px;background:var(--blue);color:#FAF8F2;font-size:12px;font-weight:700;border:none;cursor:pointer}
.btn svg{width:14px;height:14px;fill:none;stroke:#FAF8F2;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.tog{width:42px;height:24px;border-radius:99px;position:relative;flex:none}
.tog .k{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#FAF8F2}
.on .k,.tog.on .k{left:21px}.off .k,.tog.off .k{left:3px;top:2px}
.act{width:25px;height:25px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none}
.act svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.view{background:var(--bluet);color:var(--blued)}.edit{background:var(--grayt);color:var(--gray)}.del{background:var(--redt);color:var(--red)}
.search{display:flex;align-items:center;gap:9px;height:38px;padding:0 13px;border-radius:9px;border:1.5px solid #D7D0C0;background:#FCFAF4;color:var(--ink3);font-size:12.5px}
.track{height:8px;border-radius:99px;background:#E7E2D6;overflow:hidden}
.fill{height:100%;border-radius:99px}
.money{font-family:'Roboto Slab',serif;font-weight:700;font-size:11px;color:var(--saged);background:var(--saget);border:1px solid #C9D3BC;border-radius:6px;padding:1px 6px}
.tn{font-family:'Roboto Slab',serif;font-weight:700;font-size:14px;color:var(--ink)}
.ic{fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
.muted{color:var(--ink3)}
.note{font-size:11px;color:var(--ink3);margin-top:13px;padding-top:11px;border-top:1px solid var(--line);display:flex;gap:7px;align-items:flex-start}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px;display:flex;align-items:center;gap:11px}
.cam{position:relative;border-radius:10px;overflow:hidden;border:1.5px solid var(--ink);aspect-ratio:4/3;background:linear-gradient(160deg,#3c444a,#23282b)}
.live{position:absolute;top:6px;left:6px;display:flex;align-items:center;gap:4px;font-size:8px;font-weight:700;color:#F4EFE6}
.camname{position:absolute;bottom:5px;left:7px;font-size:10px;font-weight:700;color:#F4EFE6}
.sec{font-family:'Roboto Slab',serif;font-weight:700;font-size:15px;color:var(--ink);margin:2px 0 2px}
summary{list-style:none}summary::-webkit-details-marker{display:none}
details[open]>summary .ic{transform:rotate(180deg)}
</style>
</head>
<body>

<nav class="rail" id="rail"></nav>

<div class="stage">
 <div class="wrap">
  <div class="hdr"><div class="in">
    <span class="corner" style="top:6px;left:6px"></span><span class="corner" style="top:6px;right:6px"></span>
    <div style="position:relative;flex:none">
     <svg viewBox="0 0 100 100" width="44" height="44"><circle cx="50" cy="50" r="47" fill="#FAF8F2" stroke="#3B3934" stroke-width="2.6"/><circle cx="50" cy="50" r="41" fill="none" stroke="#6E8B9A" stroke-width="0.9" stroke-dasharray="0.8 2.6"/><g fill="none" stroke="#3B3934" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M41 53 C33 47 22 46 15 50 C21 48 31 50 41 55"/><path d="M59 53 C67 47 78 46 85 50 C79 48 69 50 59 55"/><path d="M39 56 C39 48 44 45 50 45 C56 45 61 48 61 56 C61 70 56 77 50 77 C44 77 39 70 39 56 Z" fill="#FAF8F2"/><path d="M44 50 V57" stroke-width="1.2"/><path d="M50 47 V57" stroke-width="1.2"/><path d="M56 50 V57" stroke-width="1.2"/><ellipse cx="50" cy="69" rx="8.5" ry="6" fill="#FAF8F2"/></g><g fill="#3B3934"><circle cx="46" cy="59" r="1.5"/><circle cx="54" cy="59" r="1.5"/><circle cx="47.5" cy="69" r="1"/><circle cx="52.5" cy="69" r="1"/></g></svg>
     <span class="plc">Placeholder Logo</span>
    </div>
    <div><div class="greet" id="greet">Mornin', Y'all</div><div class="date" id="date">Gracie's Grove · Burnet, TX</div></div>
    <div style="flex:1;min-width:8px"></div>
    <div class="clock" id="clock">--:--</div>
    <div class="wx"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><g stroke="#C9A24E" stroke-width="1.6"><circle cx="8.5" cy="8" r="3"/><path d="M8.5 2.2v1.8M3 8h1.8M4.7 4.2 6 5.5M12.3 4.2 11 5.5"/></g><path d="M8 19h8.2a3.4 3.4 0 0 0 .3-6.8A5 5 0 0 0 7 12.6 3.4 3.4 0 0 0 8 19Z" stroke="#6E8B9A" stroke-width="1.6"/></svg><div><div class="s" style="font-weight:700;font-size:18px">86&deg;</div><div style="font-size:10px;color:var(--ink2)">Burnet</div></div></div>
  </div></div>

  <div id="screens"></div>
 </div>
</div>

<script>
const C={caden:'#C3A65E',gavin:'#8AA075',amber:'#BE8A6E',ryan:'#6E8B9A'};
function call(stroke){return `<svg class="ic" width="17" height="17" viewBox="0 0 24 24" stroke="${stroke}" stroke-width="1.9"><path d="M5 4h3l2 5-2.5 1.5a11 11 0 0 0 5 5L17 13l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 4 6 2 2 0 0 1 6 4"/></svg>`}
const VED=`<span class="act view"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-6.5 10-6.5S22 12 22 12s-3.5 6.5-10 6.5S2 12 2 12Z"/><circle cx="12" cy="12" r="2.3"/></svg></span><span class="act edit"><svg viewBox="0 0 24 24"><path d="M5 19h3l9.5-9.5-3-3L5 16zM14.5 6.5l3 3"/></svg></span><span class="act del"><svg viewBox="0 0 24 24"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg></span>`;
const ED=`<span class="act edit"><svg viewBox="0 0 24 24"><path d="M5 19h3l9.5-9.5-3-3L5 16zM14.5 6.5l3 3"/></svg></span><span class="act del"><svg viewBox="0 0 24 24"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg></span>`;
const addBtn=t=>`<button class="btn"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>${t||'Add'}</button>`;
const searchBox=t=>`<div class="search"><svg class="ic" width="16" height="16" viewBox="0 0 24 24" stroke="#9A958B" stroke-width="2"><circle cx="11" cy="11" r="6"/><path d="M15.5 15.5 20 20"/></svg>${t}</div>`;
const av=(n,c,s)=>`<span class="av" style="width:${s||34}px;height:${s||34}px;font-size:${(s||34)/2.6}px;background:${c}">${n}</span>`;
function title(t,tag){return `<div class="title"><span>${t}</span>${tag?`<span class="tag">${tag}</span>`:''}</div>`}

const SCR={};

/* ---------- HOME ---------- */
SCR.home=()=>title('Home')+`
<div class="grid2">
 <div class="card"><div class="in"><div class="lbl">Today</div>
  ${[[C.amber,'Farmers Market','8:30 · Amber'],[C.ryan,'Vet — Gracie','9:00 · Ryan'],[C.caden,'Baseball Practice','5:30 · Caden']].map(e=>`<div class="row" style="border:none;padding:6px 0;cursor:pointer"><span style="width:4px;height:28px;border-radius:3px;background:${e[0]}"></span><div style="flex:1"><b style="font-size:13px">${e[1]}</b><div class="muted" style="font-size:11px">${e[2]}</div></div></div>`).join('')}
  <div class="note" style="margin-top:8px"><span>Tap any event → opens the Calendar.</span></div>
 </div></div>
 <div class="card"><div class="in"><div class="lbl">This Week</div>
  ${[[C.gavin,'Mon · Trash Day','Gavin'],[C.caden,'Wed · Game vs. Burnet','6:00 · Caden'],[C.ryan,'Fri · Hay Delivery','10:00 · Ryan'],['#B7B3AA','Sat · Church BBQ','Everyone']].map(e=>`<div class="row" style="border:none;padding:6px 0;cursor:pointer"><span style="width:4px;height:28px;border-radius:3px;background:${e[0]}"></span><div style="flex:1"><b style="font-size:13px">${e[1]}</b><div class="muted" style="font-size:11px">${e[2]}</div></div></div>`).join('')}
 </div></div>
</div>
<div class="grid2">
 <div class="card"><div class="in"><div class="lbl">Chores Today</div>
  ${[['Amber',C.amber,'4/4'],['Ryan',C.ryan,'2/3'],['Caden',C.caden,'3/5'],['Gavin',C.gavin,'1/2']].map(p=>`<div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">${av(p[0][0],p[1],24)}<span style="font-size:12px;font-weight:600;width:48px">${p[0]}</span><span class="track" style="flex:1"><span class="fill" style="width:${parseInt(p[2])/parseInt(p[2].split('/')[1])*100}%;background:${p[1]}"></span></span><b style="font-size:11px;color:var(--saged)">${p[2]}</b></div>`).join('')}
 </div></div>
 <div class="card"><div class="in"><div class="lbl">Reminders</div>
  ${[['Water Filter (Sink)','Due now · Ryan','red'],['Register The Boat','Due now','red'],['Pay Bills','Jul 1','gold'],['Simparica Trio','Jul 1','gold']].map(r=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px"><span style="width:8px;height:8px;border-radius:50%;flex:none;background:${r[2]==='red'?'var(--red)':'var(--gold)'}"></span><div style="flex:1"><b style="font-size:12.5px">${r[0]}</b></div><span class="muted" style="font-size:10.5px;font-weight:600">${r[1]}</span></div>`).join('')}
 </div></div>
</div>
<div class="card"><div class="in"><div class="lbl">Quick Open</div>
 <div class="grid2" style="grid-template-columns:repeat(5,1fr)">${[['smarthome','Smart Home','M4 11.5 12 5l8 6.5M6.5 10.5v8.5h11v-8.5M12 19v-3.4','var(--saged)','var(--saget)'],['remotes','Remotes','M8 3h8a1.5 1.5 0 0 1 1.5 1.5v15A1.5 1.5 0 0 1 16 21H8a1.5 1.5 0 0 1-1.5-1.5v-15A1.5 1.5 0 0 1 8 3M12 6.5h.01M10 9.5h4M10 12h4','var(--clayd)','var(--clayt)'],['shopping','Shopping List','M3 4.5h2.2l2 11h9.8l1.8-8H7','var(--blued)','var(--bluet)'],['emergency','Emergency','M12 4 2.8 20h18.4zM12 10v4M12 17v.01','var(--red)','var(--redt)'],['kidsbank','Bank','M12 3v18M16 7.5c0-2-1.8-3-4-3s-4 1.2-4 3 1.8 2.5 4 3 4 1.2 4 3-1.8 3-4 3-4-1-4-3','var(--goldd)','var(--goldt)']].map(q=>`<div onclick="go('${q[0]}')" class="tile" style="cursor:pointer;flex-direction:column;text-align:center;gap:9px;padding:17px 8px"><span class="bdc" style="width:44px;height:44px;background:${q[4]};color:${q[3]}"><svg class="ic" width="23" height="23" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9"><path d="${q[2]}"/></svg></span><b style="font-size:12px">${q[1]}</b></div>`).join('')}</div>
</div></div>`;

/* ---------- CALENDAR ---------- */
SCR.calendar=()=>title('Calendar')+`<div class="card"><div class="in"><div style="display:flex;align-items:center;gap:9px;margin-bottom:12px"><div style="display:flex;gap:7px;flex:1">${['Day','Week','Month','Year'].map((f,i)=>`<span class="chip" style="${i===2?'background:var(--blue);color:#fff':'border:1.5px solid var(--border);color:var(--ink3)'}">${f}</span>`).join('')}</div><span class="muted s" style="font-size:13px;font-weight:700">June 2026</span></div><div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:4px">${[['Amber',C.amber],['Ryan',C.ryan],['Caden',C.caden],['Gavin',C.gavin],['Everyone','#B7B3AA']].map(p=>`<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--ink2)"><span style="width:9px;height:9px;border-radius:50%;background:${p[1]}"></span>${p[0]}</span>`).join('')}</div></div></div>
<div class="card"><div class="in"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">
${['Sun 28','Mon 29','Tue 30','Wed 1','Thu 2','Fri 3','Sat 4'].map((d,i)=>`<div style="text-align:center"><div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--ink3)">${d.split(' ')[0]}</div><div class="s" style="font-weight:700;font-size:15px;${i===0?'background:var(--blue);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin:3px auto 0':'margin-top:3px'}">${d.split(' ')[1]}</div></div>`).join('')}
${[
 [[C.ryan,'9a Vet'],[C.amber,'Market'],['#B7B3AA','Church']],
 [[C.gavin,'7a Trash'],[C.caden,'5:30 Ball']],
 [[C.amber,'Dentist']],
 [[C.caden,C.ryan,'6p Game']],
 [[C.ryan,'10a Hay']],
 [],
 [['#B7B3AA','BBQ'],[C.caden,C.gavin,'Tourney']]
].map((day,i)=>`<div style="min-height:92px;background:${i===0?'#EFF3F0':'#F4EEE1'};border-radius:8px;padding:5px 4px">${day.map(e=>{const txt=e[e.length-1];const cols=e.slice(0,-1);return `<div style="display:flex;gap:5px;background:#FAF6EC;border:1px solid #EAE2D2;border-radius:5px;overflow:hidden;margin-bottom:4px"><div style="width:4px;display:flex;flex-direction:column">${cols.map(c=>`<span style="flex:1;background:${c}"></span>`).join('')}</div><div style="padding:3px 4px 3px 0;font-size:9px;font-weight:700">${txt}</div></div>`}).join('')}</div>`).join('')}
</div><div class="note"><span>An event with more than one person shows a stacked color bar (one stripe per linked family member).</span></div></div></div>`;

/* ---------- CHORES ---------- */
SCR.chores=()=>title('Chores','Sunday · today')+`
<div class="card"><div class="in" style="display:flex;align-items:center;gap:9px"><div class="lbl" style="margin:0;flex:1">Whenever</div>${addBtn('Add Chore')}</div></div>
<div class="card"><div class="in">
 ${[['C',C.caden,'Backyard','$1','c'],['C',C.caden,'Clean Litter Box','$1','c'],['C',C.caden,'Dishes','no','c'],['G',C.gavin,'Dishes','no','w'],['G',C.gavin,'Kitchen Trash','no','c'],['G',C.gavin,'Mow Backyard Lawn','$3','alert']].map(c=>`<div class="row">${av(c[0],c[1],26)}<div style="flex:1;min-width:0"><b style="font-size:13px;display:block">${c[2]}</b>${c[4]==='alert'?'<span class="chip" style="color:var(--red);background:var(--redt);font-size:9px;margin-top:4px">⚠ 1 Day Left</span>':''}</div><span style="width:54px;text-align:right;flex:none">${c[3]==='no'?'<span class="muted" style="font-size:10px;font-weight:700">No Pay</span>':`<span class="money">${c[3]}</span>`}</span><span style="width:132px;display:flex;justify-content:flex-end;flex:none">${c[4]==='w'?'<span class="chip" style="color:var(--goldd);background:var(--goldt)">Waiting Approval</span>':'<span class="chip" style="color:var(--saged);background:none;border:1.5px solid var(--sage)">✓ Complete</span>'}</span></div>`).join('')}
</div></div>

/* ---------- FINANCE (Banking + Bills) ---------- */

rent"></span>').join('')}</div><div class="muted" style="font-size:10.5px;margin-top:16px">🔒 This page is locked. (Demo: any 4 digits opens it.)</div></div></div></div>`}

function clock(){const d=new Date();let h=d.getHours();const m=String(d.getMinutes()).padStart(2,'0');const ap=h>=12?'PM':'AM';let gr="Mornin', Y'all";if(h>=12&&h<17)gr="Afternoon, Y'all";else if(h>=17)gr="Evenin', Y'all";h=h%12||12;document.getElementById('clock').innerHTML=h+':'+m+'<small> '+ap+'</small>';document.getElementById('greet').textContent=gr;document.getElementById('date').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})+" · Gracie's Grove";}

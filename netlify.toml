# NeelyBot — Netlify config
[build]
  publish = "."

# Single-page app: every path serves index.html (existing files like icon.svg are served first).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"

# Never let the HTML go stale on the wall tablet.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

# Serve the PWA manifest with the correct type so it installs cleanly.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

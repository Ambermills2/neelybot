<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NeelyBot — Gracie's Grove</title>
<meta name="description" content="The Neely family wall hub.">
<meta name="theme-color" content="#6E8B9A">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NeelyBot">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500;600;700;800&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
 /* Grove OS — Oat & Espresso (light) */
 --canvas:#EBE6DB;--surface:#FAF7F0;--ink:#2C2823;--ink2:#575147;--ink3:#8A8478;
 --border:#E3DCCC;--frame:#D8D1C1;--line:#EAE3D4;
 --rail:#26221C;--railt:#CDC3AD;
 --blue:#7C8666;--blued:#566148;--bluet:#E7EADF;--bluer:#CDD3BE;
 --sage:#7C8666;--saged:#5E7A52;--saget:#E7EADF;
 --clay:#B07C5E;--clayd:#8E5B40;--clayt:#F0E4DA;
 --gold:#C08A3E;--goldd:#8A6B22;--goldt:#F2E8D2;
 --red:#C0553D;--redt:#F3E1DA;
 --gray:#8A8478;--grayt:#EAE3D4;
 --beige:#9C7E52;--beiget:#EFE7D6;
 --amber:#B08463;--ryan:#6E7E83;--caden:#B8974E;--gavin:#7C8666;
 --slate:#6E7E83;--slated:#4F5A5E;--slatet:#E4E7E6;
 --tint:#FBF9F3;--cell:#F2ECE0;--sunk:#F2ECE0;
}
[data-theme="dark"]{
 --canvas:#1A1712;--surface:#25211A;--ink:#EEE8DA;--ink2:#C4BCA9;--ink3:#938B7B;
 --border:#352F25;--frame:#443D30;--line:#302A20;
 --rail:#120F0B;--railt:#A79C87;
 --blue:#93A07C;--blued:#B7C39E;--bluet:#2A2E22;--bluer:#3B4032;
 --sage:#93A07C;--saged:#B7C39E;--saget:#2A2E22;
 --clay:#C89574;--clayd:#E0B597;--clayt:#302319;
 --gold:#D6A24E;--goldd:#EAC583;--goldt:#2E2614;
 --red:#D96A50;--redt:#33201A;
 --gray:#938B7B;--grayt:#2C2820;
 --beige:#C0A46E;--beiget:#2A2318;
 --amber:#C89A76;--ryan:#8A9AA0;--caden:#D0AF62;--gavin:#93A07C;
 --slate:#8A9AA0;--slated:#B2BEC2;--slatet:#2A2E30;
 --tint:#1F1B15;--cell:#2E2920;--sunk:#2E2920;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--canvas);font-family:'Source Sans 3',system-ui,sans-serif;color:var(--ink);display:flex;overflow:hidden}
.s{font-family:'Roboto Slab',Georgia,serif}
svg{display:block}
.g{fill:none;stroke-linecap:round;stroke-linejoin:round}

/* RAIL */
.rail{width:84px;flex:none;background:var(--rail);display:flex;flex-direction:column;align-items:center;gap:3px;padding:14px 0;overflow-y:auto;height:100vh;box-shadow:2px 0 12px rgba(20,15,10,.18);z-index:3}
.rail::-webkit-scrollbar{width:0}
.rb{width:66px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 0;border-radius:13px;cursor:pointer;color:var(--railt)}
.rb svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.rb span{font-size:8.5px;font-weight:700;letter-spacing:.01em}
.rb:hover{background:rgba(255,248,235,.07)}
.rb.on{background:#EDE6D8;color:#4E4A40}
.rb.on svg{stroke:var(--sage)}

/* STAGE */
.stage{flex:1;height:100vh;overflow-y:auto}
.wrap{max-width:1360px;margin:0 auto;padding:16px 22px 40px}

/* HEADER */
.hdr{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:0;margin-bottom:12px;box-shadow:0 2px 10px rgba(44,40,35,.05)}
.hdr .in{border:none;border-radius:16px;padding:15px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:relative}
.hdr .corner{display:none}
.greet{font-family:'Roboto Slab',Georgia,serif;font-weight:700;font-size:30px;color:var(--ink);line-height:1}
.date{font-size:12px;color:var(--ink2);margin-top:5px}
.clock{font-weight:700;font-size:40px;color:var(--ink);line-height:.9}
.clock small{font-size:15px;color:var(--blue);font-weight:600}
.wx{display:flex;align-items:center;gap:8px;padding-left:14px;border-left:1px solid #C9D2D6}
.plc{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);background:var(--line);border:1px solid var(--border);border-radius:5px;padding:2px 5px;position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);white-space:nowrap}

/* SCREENS */
.screen{display:none}
.screen.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.title{font-weight:800;font-size:22px;color:var(--ink);margin:2px 0 14px;display:flex;align-items:center;gap:10px}
.title .tag{font-size:11px;font-weight:700;color:var(--ink3);background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:3px 10px;margin-left:auto}

/* COMPONENTS */
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:0;margin-bottom:12px;display:flex;flex-direction:column;box-shadow:0 2px 10px rgba(44,40,35,.05)}
.card .in{border:none;border-radius:16px;padding:16px 18px;flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:9px}
.gl{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin:14px 0 7px}
.gl.first{margin-top:2px}
.row{display:flex;align-items:center;gap:11px;padding:9px 2px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.av{border-radius:50%;color:#FAF8F2;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
.bd{border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
.bdc{border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;border-radius:99px;padding:4px 11px}
.btn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 13px;border-radius:8px;background:var(--blued);color:#FAF8F2;font-size:12px;font-weight:700;border:none;cursor:pointer}
.btn svg{width:14px;height:14px;fill:none;stroke:#FAF8F2;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.tog{width:42px;height:24px;border-radius:99px;position:relative;flex:none}
.tog .k{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#FAF8F2}
.on .k,.tog.on .k{left:21px}.off .k,.tog.off .k{left:3px;top:2px}
.act{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
.act+.act{margin-left:4px}
.act svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.view{background:var(--bluet);color:var(--blued)}.edit{background:var(--grayt);color:var(--gray)}.del{background:var(--redt);color:var(--red)}
.search{display:flex;align-items:center;gap:9px;height:38px;padding:0 13px;border-radius:9px;border:1.5px solid var(--frame);background:var(--tint);color:var(--ink3);font-size:12.5px}
.track{height:8px;border-radius:99px;background:var(--grayt);overflow:hidden}
.fill{height:100%;border-radius:99px}
.money{font-family:'Roboto Slab',serif;font-weight:700;font-size:11px;color:var(--saged);background:var(--saget);border:1px solid #C9D3BC;border-radius:6px;padding:1px 6px}
.tn{font-family:'Roboto Slab',serif;font-weight:700;font-size:14px;color:var(--ink)}
.ic{fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
.muted{color:var(--ink3)}
.note{font-size:11px;color:var(--ink3);margin-top:13px;padding-top:11px;border-top:1px solid var(--line);display:flex;gap:7px;align-items:flex-start}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px;display:flex;align-items:center;gap:11px}
.cam{position:relative;border-radius:10px;overflow:hidden;border:1.5px solid var(--ink);aspect-ratio:4/3;background:linear-gradient(160deg,#3c444a,#23282b)}
.live{position:absolute;top:6px;left:6px;display:flex;align-items:center;gap:4px;font-size:8px;font-weight:700;color:#F4EFE6}
.camname{position:absolute;bottom:5px;left:7px;font-size:10px;font-weight:700;color:#F4EFE6}
.sec{font-family:'Roboto Slab',serif;font-weight:700;font-size:15px;color:var(--ink);margin:2px 0 2px}
.addcart{width:34px;height:34px;border-radius:50%;border:none;background:var(--bluet);color:var(--blued);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
.addcart svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.4;stroke-linecap:round}
.modal{display:none;position:fixed;inset:0;background:rgba(43,40,34,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-box{background:var(--surface);border:1.5px solid var(--ink);border-radius:16px;padding:5px;max-width:380px;width:100%}
.modal-box .pad{border:1px solid var(--frame);border-radius:12px;padding:18px}
.storebtn{display:flex;align-items:center;gap:10px;width:100%;height:44px;padding:0 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:700;color:var(--ink);cursor:pointer}
.cbx{width:27px;height:27px;border-radius:7px;border:2px solid var(--frame);flex:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s}
.cbx svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:3;opacity:0;transition:opacity .12s}
.cbx.on{background:var(--sage);border-color:var(--sage)}
.cbx.on svg{opacity:1}
.storebtn:hover{background:var(--line)}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--ink);color:var(--surface);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;max-width:88%;text-align:center}
.toast.show{opacity:1}
.modal-box .pad{max-height:82vh;overflow-y:auto}
.fld{width:100%;min-height:40px;padding:9px 12px;border-radius:9px;border:1.5px solid var(--frame);background:var(--tint);font-size:13px;color:var(--ink);font-family:inherit;resize:none;box-sizing:border-box}
.fld:focus{outline:none;border-color:var(--blue)}
summary{list-style:none}summary::-webkit-details-marker{display:none}
details[open]>summary .ic{transform:rotate(180deg)}

/* ---------- PHONE / NARROW SCREENS ---------- */
@media (max-width:640px){
  body{display:block;overflow-x:hidden;overflow-y:auto;height:auto}
  .rail{position:fixed;bottom:0;left:0;right:0;width:auto;height:auto;flex-direction:row;justify-content:flex-start;align-items:stretch;gap:2px;padding:5px 6px;border-right:none;border-top:1.5px solid var(--ink);overflow-x:auto;overflow-y:hidden;z-index:60}
  .rb{flex:0 0 auto;width:58px;padding:6px 0;border-radius:11px}
  .stage{height:auto;overflow:visible}
  .wrap{max-width:100%;padding:12px 12px 90px}
  .hdr .in{padding:11px 13px;gap:9px}
  .greet{font-size:20px}
  .date{font-size:11px}
  .clock{font-size:30px}
  .clock small{font-size:12px}
  .wx{padding-left:10px}
  .wx svg{width:26px;height:26px}
  .plc{display:none}
  .grid2,.grid3{grid-template-columns:1fr !important}
  .grid2:has(.cam){grid-template-columns:repeat(2,1fr) !important}
  .title{font-size:19px}
  .card .in{padding:13px}
}

/* ============================================================
   GROVE OS — dashboard screens (scoped under .gos so the rest
   of the app is untouched). Pixel-matches the approved mockup.
   ============================================================ */
:root{
  --surface-sunk:var(--sunk);--ink-2:var(--ink2);--ink-3:var(--ink3);
  --line-strong:var(--frame);
  --accent-sage:var(--sage);--accent-sage-tint:var(--saget);
  --accent-clay:var(--clay);--accent-clay-tint:var(--clayt);
  --st-over:var(--red);--st-over-bg:var(--redt);
  --st-warn:var(--gold);--st-warn-bg:var(--goldt);
  --st-good:var(--saged);--st-good-bg:var(--saget);
  --p-amber:var(--amber);--p-ryan:var(--ryan);--p-caden:var(--caden);--p-gavin:var(--gavin);
  --r-tile:18px;--r-inner:12px;--r-chip:999px;
  --shadow-tile:0 2px 10px rgba(44,40,35,.06);
  --font-display:'Roboto Slab',Georgia,serif;
  --font-body:'Source Sans 3',system-ui,sans-serif;
}
.gos{font-family:var(--font-body);color:var(--ink);min-height:calc(100vh - 56px)}
.gos.gos-home{display:grid;grid-template-columns:1.55fr 1fr;grid-template-rows:auto 1fr auto auto;gap:13px;height:calc(100vh - 56px)}
.gos .hero-band{grid-column:1 / -1;display:grid;grid-template-columns:1.55fr 1fr;gap:14px}
.gos .tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-tile);box-shadow:var(--shadow-tile);padding:16px 18px;min-width:0;display:block;align-items:stretch;text-align:left}
.gos .eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:var(--ink-3)}
/* clock hero */
.gos .t-clock{display:flex;flex-direction:column;justify-content:center;padding:14px 22px}
.gos .loc-row{display:flex;align-items:center;gap:8px}
.gos .loc-row .dot{width:8px;height:8px;border-radius:50%;background:var(--accent-sage);box-shadow:0 0 6px rgba(124,134,102,.5)}
.gos .greeting{font-family:var(--font-display);font-size:34px;font-weight:700;line-height:1;margin:9px 0 3px;color:var(--ink)}
.gos .greet-date{font-size:13.5px;color:var(--ink-2)}
.gos .clock-div{height:1px;background:var(--line);margin:12px 0 8px}
.gos .clock-line{display:flex;align-items:baseline;gap:10px}
.gos .clock{font-family:var(--font-display);font-size:74px;font-weight:700;line-height:.82;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.gos .ampm{font-size:22px;font-weight:600;color:var(--ink-3);letter-spacing:.02em}
/* weather */
.gos .t-weather{display:flex;flex-direction:column;justify-content:center}
.gos .wx-main{display:flex;align-items:center;gap:14px}
.gos .wx-sun{width:52px;height:52px;flex:0 0 52px}
.gos .wx-temp{font-family:var(--font-display);font-size:52px;font-weight:700;line-height:.9;color:var(--ink);font-variant-numeric:tabular-nums}
.gos .wx-cond{font-size:12.5px;color:var(--ink-2);margin-top:3px}
.gos .wx-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line)}
.gos .wx-town{display:flex;flex-direction:column;gap:1px;text-align:left}
.gos .wx-town .tt{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.gos .wx-town .tn{font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* today */
.gos .t-today{grid-column:2;grid-row:3;display:flex;flex-direction:column;overflow:hidden}
.gos .t-split{grid-column:1;grid-row:2;display:grid;grid-template-columns:1fr 1fr;gap:13px;min-width:0;min-height:0}
.gos .t-projects{display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden;cursor:pointer}
.gos .t-projects .rem-list{flex:1;overflow-y:auto;min-height:0}
.gos .today-list{display:flex;flex-direction:column;margin-top:10px;flex:1;overflow-y:auto}
.gos .ev-row{display:flex;align-items:center;gap:13px;padding:11px 0;border-top:1px solid var(--line)}
.gos .ev-row:first-child{border-top:none}
.gos .ev-tick{width:3px;align-self:stretch;border-radius:3px;flex:0 0 3px;min-height:34px}
.gos .ev-time{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--ink);width:62px;flex:0 0 62px;font-variant-numeric:tabular-nums}
.gos .ev-body{min-width:0}
.gos .ev-title{font-size:15px;font-weight:600;color:var(--ink)}
.gos .ev-sub{font-size:13px;color:var(--ink-2);margin-top:1px}
.gos .bday-nudge{margin-top:12px;display:flex;align-items:center;gap:9px;background:var(--accent-clay-tint);border-radius:var(--r-inner);padding:9px 13px;font-size:13px;color:var(--clayd);font-weight:600}
.gos .bday-nudge svg{width:17px;height:17px;stroke:var(--accent-clay);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex:0 0 17px}
/* kids banking */
.gos .t-bank{grid-column:2;grid-row:2;display:flex;flex-direction:column;gap:12px}
.gos .bank-kid{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-tile);box-shadow:var(--shadow-tile);padding:14px 16px;flex:1;display:flex;flex-direction:column;cursor:pointer}
.gos .bank-head{display:flex;align-items:center;gap:10px}
.gos .avatar{width:38px;height:38px;flex:0 0 38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:16px;color:#fff}
.gos .bank-who{display:flex;flex-direction:column;line-height:1.15}
.gos .bank-name{font-size:14px;font-weight:700;color:var(--ink)}
.gos .bank-grade{font-size:11.5px;color:var(--ink-3)}
.gos .bank-bal{margin-left:auto;font-family:var(--font-display);font-size:38px;font-weight:700;color:var(--ink);line-height:.9;font-variant-numeric:tabular-nums}
.gos .bank-bal .cents{font-size:19px;color:var(--ink-3);font-weight:700}
.gos .bank-foot{display:flex;align-items:center;gap:10px;margin-top:11px}
.gos .chore-prog{flex:1}
.gos .chore-lab{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-2);margin-bottom:5px}
.gos .chore-lab b{color:var(--ink);font-weight:700}
.gos .track{height:7px;border-radius:999px;background:var(--surface-sunk);overflow:hidden}
.gos .fill{height:100%;border-radius:999px;background:var(--accent-sage)}
.gos .pill{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:5px 10px;border-radius:999px;white-space:nowrap}
.gos .pill-pending{background:var(--accent-sage-tint);color:var(--saged)}
/* reminders */
.gos .t-remind{display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden;cursor:pointer}
.gos .t-remind .rem-list{flex:1;overflow-y:auto;min-height:0}
.gos .rem-list{margin-top:9px;display:flex;flex-direction:column}
.gos .rem-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-top:1px solid var(--line)}
.gos .rem-row:first-child{border-top:none}
.gos .rem-dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px}
.gos .rem-mid{min-width:0;flex:1}
.gos .rem-title{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gos .rem-meta{font-size:12px;color:var(--ink-3);margin-top:1px}
.gos .due-pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
.gos .due-clay{background:var(--st-warn-bg);color:var(--goldd)}
.gos .due-muted{background:var(--surface-sunk);color:var(--ink-3)}
/* this week */
.gos .t-week{grid-column:1;grid-row:3;display:flex;flex-direction:column}
.gos .week-grid{display:flex;gap:8px;margin-top:10px;flex:1}
.gos .week-day{flex:1;background:var(--surface-sunk);border-radius:var(--r-inner);padding:9px 8px;display:flex;flex-direction:column;gap:4px;min-width:0}
.gos .week-day.hot{background:var(--accent-clay-tint)}
.gos .week-dow{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:700}
.gos .week-num{font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--ink);line-height:.9;font-variant-numeric:tabular-nums}
.gos .week-day.hot .week-num{color:var(--accent-clay)}

function choreBankCard(list,choreRow,who){var ttl=who==='Everyone'?'All Chores':'All of '+who+'&#39;s Chores';var DI={Mon:0,Tue:1,Wed:2,Thu:3,Fri:4,Sat:5,Sun:6};var flist=(choreBankDay==='All')?list:list.filter(function(o){return choreDaysInfo(o.c).idxs.indexOf(DI[choreBankDay])>=0;});var days=['All','Mon','Tue','Wed','Thu','Fri','Sat','Sun'];var dayChips='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px">'+days.map(function(d){return '<span onclick="setChoreBankDay(\''+d+'\')" class="chip" style="cursor:pointer;font-size:10px;'+(choreBankDay===d?'background:var(--blued);color:#fff':'border:1.5px solid var(--border);color:var(--ink3)')+'">'+d+'</span>';}).join('')+'</div>';var bankRows=flist.length?flist.map(function(o){return choreBankRow(o.c,o.i);}).join(''):'<div class="muted" style="font-size:12px;padding:3px 2px">'+(choreBankDay==='All'?('No chores'+(who==='Everyone'?'':' for '+who)+' yet.'):('No chores on '+choreBankDay+'.'))+'</div>';return '<div class="card"><div class="in"><div class="row" onclick="toggleChoreBank()" style="cursor:pointer;padding:6px 0"><div style="flex:1"><b style="font-size:13px">'+ttl+'</b><div class="muted" style="font-size:10px">'+list.length+' total · edit or delete here · tap to '+(_choreBankOpen?'hide':'show')+'</div></div><span class="act" id="chBankCv" style="color:#C7C0B0;transform:'+(_choreBankOpen?'rotate(180deg)':'none')+'"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span></div><div id="chBankList" style="display:'+(_choreBankOpen?'block':'none')+';margin-top:8px">'+dayChips+bankRows+'</div></div></div>';}
function choreTodayBank(list,choreRow){var todays=list.filter(function(o){return choreActiveToday(o.c);});var dow=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];var todayCard='<div class="card"><div class="in"><div class="lbl" style="margin-bottom:7px">Today&#39;s Chores · '+dow+'</div>'+(todays.length?todays.map(function(o){return choreRow(o.c,o.i);}).join(''):'<div class="muted" style="font-size:12px;padding:3px 2px">Nothing due today for '+choreFilter+'. 🎉</div>')+'</div></div>';return todayCard+choreBankCard(list,choreRow,choreFilter);}

<div class="card"><div class="in">${list.length?list.map(o=>{const p=o.p,i=o.i;const done=p.steps.filter(s=>s[1]).length;const inprog=p.steps.filter(s=>s[2]&&!s[1]).length;const pct=p.steps.length?Math.round(done/p.steps.length*100):0;const cc=p.color;return `<div class="tile" onclick="openProject(${i})" style="display:block;margin-bottom:9px;cursor:pointer"><div style="display:flex;align-items:center;gap:9px"><b class="s" style="flex:1;font-size:14.5px">${p.name}</b>${Array.isArray(p.who)&&p.who.length?`<span style="display:flex;gap:3px;align-items:center">${p.who.map(w=>av(w[0],C[w.toLowerCase()]||'#B7B3AA',19)).join('')}</span>`:''}<span class="chip" style="font-size:9px;${cc==='red'?'color:var(--red);background:var(--redt)':cc==='blue'?'color:var(--blued);background:var(--bluet)':cc==='gold'?'color:var(--goldd);background:var(--goldt)':'color:var(--saged);background:var(--saget)'}">${p.status}</span><span class="act" style="color:#C7C0B0"><svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></span></div><div class="track" style="margin-top:10px"><div class="fill" style="width:${pct}%;background:${cc==='gold'?'var(--gold)':cc==='sage'?'var(--sage)':cc==='red'?'var(--red)':'var(--blue)'}"></div></div><div class="muted" style="font-size:11px;margin-top:7px">${p.steps.length?done+' of '+p.steps.length+' done'+(inprog?' · '+inprog+' in progress':''):'No steps yet'}${p.due?' · Goal '+fmtDue(p.due):''}</div></div>`}).join(''):`<div class="muted" style="font-size:12px;padding:3px 2px">No ${projFilter.toLowerCase()} projects.</div>`}</div></div>`};

<div class="card"><div class="in"><div style="display:flex;align-items:flex-start;gap:8px"><div style="flex:1"><div class="sec">${t.name}</div><div class="muted" style="font-size:12px;margin-top:3px">${t.sub}</div></div>${edRowI("editTripRec("+tripSel+")",'TRIPS',tripSel)}</div></div></div>
<div class="card"><div class="in"><div class="sec">Packing</div><div class="muted" style="font-size:11.5px;margin:2px 0 10px">Tap a name to see their list.</div><div style="display:flex;gap:9px;flex-wrap:wrap">${people.map(p=>`<span onclick="setPack('${p[0]}')" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:99px;font-size:12px;font-weight:700;${packSel===p[0]?'background:'+p[1]+';color:#fff;border:1.5px solid '+p[1]:'border:1.5px solid '+p[1]+';color:'+p[1]}">${av(p[0][0],packSel===p[0]?'rgba(255,255,255,.3)':p[1],20)}${p[0]}</span>`).join('')}</div>
<div style="margin-top:11px"><div style="display:flex;align-items:center;margin-bottom:3px"><span class="gl" style="margin:0;flex:1">${packSel}'s List</span><button class="btn" onclick="addPackItem()" style="height:26px;font-size:10px;padding:0 9px"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Add</button></div>${(t.packing[packSel]||[]).map((it,i)=>`<div class="row">${cbx(it,'pack:'+tripSel+':'+packSel)}<b style="flex:1;font-size:13px">${it}</b><span class="act edit" onclick="editPackItem(${i})">${_svgE}</span><span class="act del" onclick="delPackItem(${i})">${_svgD}</span></div>`).join('')}</div></div></div>

<div class="card"><div class="in"><div style="display:flex;align-items:center;margin-bottom:8px"><span class="sec" style="flex:1">Travel</span><button class="btn" onclick="openTravel()" style="height:28px;font-size:10.5px;padding:0 11px"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Add</button></div><div style="margin-top:6px">${t.travel.map(tr=>`<div style="display:flex;justify-content:space-between;padding:7px 2px;border-bottom:1px solid var(--line);font-size:12.5px"><span class="muted">${tr[0]}</span><b>${tr[1]}</b></div>`).join('')}</div></div></div>

/* ---------- REMOTES ---------- */
let remDevice='Roku',remRoom='Master';
const REM_ROOMS={Roku:['Master','Boys Room','Patio'],Samsung:['Living Room']};
function setRemDevice(d){remDevice=d;remRoom=REM_ROOMS[d][0];document.getElementById('screens').innerHTML=SCR.remotes();}
function setRemRoom(r){remRoom=r;document.getElementById('screens').innerHTML=SCR.remotes();}
/* ---------- ROKU CONTROL (local ECP API over Wi-Fi) ---------- */
let ROKU_IPS={'Master':'192.168.1.132','Boys Room':'192.168.1.168','Patio':''};
function remotePress(kind,val,label){if(remDevice!=='Roku'){openSmartThings();return}const ip=ROKU_IPS[remRoom];if(!ip){toast('Add the '+remRoom+' Roku IP first');editRoku();return}let path;if(kind==='launch'){path=val.charAt(0)==='?'?('search/browse?keyword='+encodeURIComponent(val.slice(1))+'&type=channel&launch=true'):('launch/'+val)}else{path='keypress/'+val}try{fetch('http://'+ip+':8060/'+path,{method:'POST',mode:'no-cors'}).catch(function(){})}catch(e){}if(kind==='launch'&&label)toast('Opening '+label+' on '+remRoom)}
function editRoku(){const rooms=REM_ROOMS.Roku;const pad=document.querySelector('#modal .pad');pad.innerHTML='<div class="lbl" style="margin-bottom:4px">Roku Devices</div><div class="muted" style="font-size:11.5px;margin-bottom:12px">Find each Roku\'s IP on the TV: Settings → Network → About.</div>'+rooms.map(function(rm,i){return '<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--ink3);margin-bottom:4px">'+rm+'</div><input id="rip'+i+'" class="fld" inputmode="decimal" placeholder="e.g. 192.168.1.50" value="'+escH(ROKU_IPS[rm]||'')+'"></div>'}).join('')+'<div class="note" style="margin:2px 0 12px"><svg class="ic" width="14" height="14" viewBox="0 0 24 24" stroke="#9A958B" stroke-width="2" style="flex:none"><path d="M5 12.5a10 10 0 0 1 14 0M8 15.5a6 6 0 0 1 8 0M12 18.5h.01"/></svg><span>Works when the hub runs on the tablet on your home Wi‑Fi.</span></div><div style="display:flex;gap:9px"><button onclick="closeModal()" style="flex:1;height:40px;border-radius:10px;border:1.5px solid var(--border);background:none;color:var(--ink2);font-weight:700;cursor:pointer">Cancel</button><button onclick="saveRokuIPs()" style="flex:1;height:40px;border-radius:10px;border:none;background:var(--blued);color:#fff;font-weight:700;cursor:pointer">Save</button></div>';document.getElementById('modal').classList.add('show')}
function saveRokuIPs(){REM_ROOMS.Roku.forEach(function(rm,i){const el=document.getElementById('rip'+i);if(el)ROKU_IPS[rm]=(el.value||'').trim()});closeModal();if(location.hash==='#remotes')document.getElementById('screens').innerHTML=SCR.remotes();toast('Roku devices saved 📺')}
function openSmartThings(){window.open('https://my.smartthings.com','_blank');toast('Opening SmartThings ↗')}
function openAlexaWeb(){window.open('https://alexa.amazon.com','_blank');toast('Opening Alexa ↗')}

<div class="card"><div class="in" style="text-align:center">

 <div style="position:relative;width:164px;height:164px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#565b63,#3d4147);border:1px solid #2c2e33;margin:0 auto 20px;box-shadow:inset 0 2px 6px rgba(0,0,0,.25)">
  ${[['top:13px;left:50%;transform:translateX(-50%)','M6 15l6-6 6 6','Up'],['bottom:13px;left:50%;transform:translateX(-50%)','M6 9l6 6 6-6','Down'],['left:13px;top:50%;transform:translateY(-50%)','M15 6l-6 6 6 6','Left'],['right:13px;top:50%;transform:translateY(-50%)','M9 6l6 6-6 6','Right']].map(a=>`<span onclick="remotePress('key','${a[2]}')" style="cursor:pointer;position:absolute;${a[0]}"><svg class="ic" width="19" height="19" viewBox="0 0 24 24" stroke="#EAF2F6" stroke-width="2.5"><path d="${a[1]}"/></svg></span>`).join('')}

 </div>

 <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">${[['Netflix','#E5524B','12'],['YouTube','#FF5A5A','837'],['Prime Video','#34B3E4','13'],['Fubo','#F97A45','?fuboTV']].map(a=>`<span onclick="remotePress('launch','${a[2]}','${a[0]}')" style="cursor:pointer;height:36px;border-radius:9px;background:#3c4046;border:1px solid #26282c;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;letter-spacing:.03em;color:${a[1]};box-shadow:inset 0 1px 0 rgba(255,255,255,.07)">${a[0]}</span>`).join('')}</div>
 <div style="text-align:center;font-family:'Roboto Slab',serif;font-size:9px;letter-spacing:.34em;color:rgba(255,255,255,.32)">NEELYBOT</div>

function clock(){const d=new Date();let h=d.getHours();const m=String(d.getMinutes()).padStart(2,'0');const ap=h>=12?'PM':'AM';let gr="Mornin', Y'all";if(h>=12&&h<17)gr="Afternoon, Y'all";else if(h>=17)gr="Evenin', Y'all";h=h%12||12;document.getElementById('clock').innerHTML=h+':'+m+'<small> '+ap+'</small>';document.getElementById('greet').textContent=greetOverride||gr;document.getElementById('date').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})+" · Gracie's Grove";var _gc=document.getElementById('gClock');if(_gc){_gc.textContent=h+':'+m;var _ga=document.getElementById('gAmPm');if(_ga)_ga.textContent=ap;var _gg=document.getElementById('gGreet');if(_gg)_gg.textContent=greetOverride||gr;var _gd=document.getElementById('gDate');if(_gd)_gd.textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}if(typeof applyTheme==='function')applyTheme();}

const escH=s=>(''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
let priceQuery='',priceStores=new Set(['HEB','Walmart','Amazon']),_pcItem=null;
function pcHash(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h}
function domainFor(store){const r=STORES.find(x=>x[0]===store);return r?r[1]:store.toLowerCase().replace(/[^a-z0-9]/g,'')+'.com'}
function priceFor(q,store){q=q.toLowerCase().trim();const base=3+(pcHash(q)%2700)/100;const f={HEB:.96,Walmart:.92,'Home Depot':1.06,Lowes:1.04,'Tractor Supply':1.1,Amazon:1.0,"Dick's":1.12}[store]||1;const off=(pcHash(q+'|'+store)%500)/100-2.5;return Math.max(0.99,+(base*f+off).toFixed(2))}
const PACKS=['Single','2 pack','3 pack','4 pack','6 pack','8 pack','12 ct','16 oz','24 oz','32 oz','Family size','Value pack','Bulk pack'];
function specFor(q,store){return PACKS[pcHash((q||'').toLowerCase().trim()+'#'+store)%PACKS.length]}
function priceResults(){const q=priceQuery.trim();if(!q||!priceStores.size)return [];return [...priceStores].map(s=>({store:s,price:priceFor(q,s)})).sort((a,b)=>a.price-b.price)}

function fmtTime(iso){try{const d=new Date(iso);let h=d.getHours();const m=String(d.getMinutes()).padStart(2,'0');const ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+m+' '+ap}catch(e){return ''}}
function isNightNow(){try{if(WXSUN&&WXSUN.sunset&&WXSUN.sunrise){const now=new Date(),sr=new Date(WXSUN.sunrise),ss=new Date(WXSUN.sunset);if(!isNaN(sr)&&!isNaN(ss))return now<sr||now>=ss}}catch(e){}const h=new Date().getHours();return h<7||h>=20}
